<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arckey — Intro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #080808;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }

  .scene {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  /* Topo background */
  .bg {
    position: absolute; inset: 0;
    opacity: 0;
    animation: bgFade 2s 0.2s ease forwards;
  }
  @keyframes bgFade { to { opacity: 1; } }

  /* Particle dots */
  .particles {
    position: absolute; inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: #cc2222;
    border-radius: 50%;
    opacity: 0;
    animation: particleFloat linear infinite;
  }
  @keyframes particleFloat {
    0%   { opacity: 0; transform: translateY(0) scale(1); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-120px) scale(0.4); }
  }

  /* Keyboard wrapper */
  .keyboard-wrap {
    position: relative;
    transform: perspective(1000px) rotateX(24deg) rotateZ(-1.5deg);
    opacity: 0;
    animation: kbFloat 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    filter: drop-shadow(0 60px 80px rgba(0,0,0,0.9));
  }
  @keyframes kbFloat {
    from { opacity: 0; transform: perspective(1000px) rotateX(42deg) rotateZ(-1.5deg) translateY(80px); }
    to   { opacity: 1; transform: perspective(1000px) rotateX(24deg) rotateZ(-1.5deg) translateY(0); }
  }

  .keyboard {
    background: #0e0e0e;
    border-radius: 16px;
    padding: 22px 24px 28px;
    border: 1px solid #1e1e1e;
    position: relative;
  }

  /* Red glow under keyboard */
  .keyboard::after {
    content: '';
    position: absolute;
    bottom: -30px; left: 10%; right: 10%;
    height: 40px;
    background: radial-gradient(ellipse, rgba(180,20,20,0.35) 0%, transparent 70%);
    filter: blur(12px);
    pointer-events: none;
  }

  .key-row {
    display: flex;
    gap: 5px;
    margin-bottom: 5px;
    justify-content: center;
    min-height: 45px;
  }

  .key {
    border-radius: 5px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-size: 8.5px;
    font-weight: 500;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;

    opacity: 0;
    transform: translateY(-10px) scale(0.95);
    animation: keyPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;

    cursor: default;
    user-select: none;
    transition: transform 0.07s ease, filter 0.1s ease;
  }

  @keyframes keyPop {
    from { opacity: 0; transform: translateY(-10px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Topographic line texture */
  .key::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(
        -55deg,
        transparent 0px, transparent 5px,
        rgba(160,30,30,0.07) 5px, rgba(160,30,30,0.07) 6px
      ),
      repeating-linear-gradient(
        35deg,
        transparent 0px, transparent 8px,
        rgba(100,10,10,0.05) 8px, rgba(100,10,10,0.05) 9px
      );
    pointer-events: none;
  }

  /* Shine shimmer on top */
  .key::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.04), transparent);
    pointer-events: none;
  }

  .key-dark {
    background: linear-gradient(160deg, #1a0808 0%, #260a0a 60%, #180606 100%);
    border-top: 1.5px solid #331010;
    border-left: 1.5px solid #280c0c;
    border-right: 1.5px solid #0e0404;
    border-bottom: 3.5px solid #090202;
    color: #bb2222;
  }

  .key-red {
    background: linear-gradient(160deg, #3a0b0b 0%, #520e0e 60%, #380909 100%);
    border-top: 1.5px solid #7a1c1c;
    border-left: 1.5px solid #5e1414;
    border-right: 1.5px solid #1e0606;
    border-bottom: 3.5px solid #120404;
    color: #ff5555;
  }

  .key-mid {
    background: linear-gradient(160deg, #280909 0%, #3c0c0c 60%, #220707 100%);
    border-top: 1.5px solid #4a1414;
    border-left: 1.5px solid #380e0e;
    border-right: 1.5px solid #120404;
    border-bottom: 3.5px solid #0a0202;
    color: #dd3333;
  }

  .key.lit {
    filter: brightness(1.5);
    color: #ff3333 !important;
    text-shadow: 0 0 8px rgba(255,60,60,0.95), 0 0 16px rgba(255,30,30,0.6) !important;
  }

  .key.pressed {
    transform: translateY(2px) !important;
    border-bottom-width: 1.5px !important;
  }

  /* Logo overlay */
  .logo-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    animation: logoIn 1.2s cubic-bezier(0.16,1,0.3,1) 1.8s forwards;
  }
  @keyframes logoIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.88) translateY(10px); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1) translateY(0); }
  }

  .logo-a {
    margin: 0 auto 14px;
    width: 52px; height: 52px;
    opacity: 0;
    animation: logoIn 0.8s cubic-bezier(0.16,1,0.3,1) 2s forwards;
  }

  .logo-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    letter-spacing: 20px;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 60px rgba(255,255,255,0.08);
  }

  .logo-divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(to right, transparent, #331111, #cc2222, #331111, transparent);
    margin: 14px auto;
    opacity: 0;
    animation: dividerIn 0.8s ease 2.4s forwards;
  }
  @keyframes dividerIn { to { opacity: 1; } }

  .logo-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 10px;
    color: #cc2222;
    text-shadow: 0 0 20px rgba(200,30,30,0.5);
    opacity: 0;
    animation: logoIn 0.8s ease 2.5s forwards;
  }

  /* Scan lines */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none; z-index: 30;
  }

  /* Vignette */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
    pointer-events: none; z-index: 25;
  }

  /* Corner marks */
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    opacity: 0;
    animation: cornerIn 0.5s ease 2.8s forwards;
  }
  @keyframes cornerIn { to { opacity: 0.4; } }
  .corner svg { width: 100%; height: 100%; }
  .c-tl { top: 24px; left: 24px; }
  .c-tr { top: 24px; right: 24px; transform: rotate(90deg); }
  .c-bl { bottom: 24px; left: 24px; transform: rotate(-90deg); }
  .c-br { bottom: 24px; right: 24px; transform: rotate(180deg); }
</style>
</head>
<body>
<div class="scene">

  <!-- Background topo SVG -->
  <div class="bg">
    <svg style="position:absolute;inset:0;width:100%;height:100%" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="centerglow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#200505" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1920" height="1080" fill="#080808"/>
      <rect width="1920" height="1080" fill="url(#centerglow)"/>
      <g stroke="#1c0404" stroke-width="0.6" fill="none" opacity="0.8">
        <ellipse cx="960" cy="540" rx="120" ry="70"/>
        <ellipse cx="960" cy="540" rx="220" ry="130"/>
        <ellipse cx="960" cy="540" rx="320" ry="190"/>
        <ellipse cx="960" cy="540" rx="420" ry="250"/>
        <ellipse cx="960" cy="540" rx="520" ry="310"/>
        <ellipse cx="960" cy="540" rx="620" ry="370"/>
        <ellipse cx="960" cy="540" rx="720" ry="430"/>
        <ellipse cx="960" cy="540" rx="820" ry="490"/>
        <ellipse cx="960" cy="540" rx="920" ry="540"/>
        <ellipse cx="960" cy="540" rx="1020" ry="590"/>
      </g>
      <g stroke="#110202" stroke-width="0.4" fill="none" opacity="0.5">
        <ellipse cx="960" cy="540" rx="170" ry="100"/>
        <ellipse cx="960" cy="540" rx="270" ry="160"/>
        <ellipse cx="960" cy="540" rx="370" ry="220"/>
        <ellipse cx="960" cy="540" rx="470" ry="280"/>
        <ellipse cx="960" cy="540" rx="570" ry="340"/>
        <ellipse cx="960" cy="540" rx="670" ry="400"/>
        <ellipse cx="960" cy="540" rx="770" ry="460"/>
        <ellipse cx="960" cy="540" rx="870" ry="510"/>
        <ellipse cx="960" cy="540" rx="970" ry="560"/>
      </g>
    </svg>
  </div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Keyboard -->
  <div class="keyboard-center">
    <div class="keyboard-wrap">
      <div class="keyboard" id="keyboard">
        <div id="rows"></div>
      </div>
    </div>

    <!-- Logo overlay -->
    <div class="logo-overlay">
      <svg class="logo-a" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="26" y1="4" x2="4" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
        <line x1="26" y1="4" x2="48" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
        <line x1="12" y1="30" x2="40" y2="30" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <div class="logo-name">ARCKEY</div>
      <div class="logo-divider"></div>
      <div class="logo-sub">KEYBOARDS</div>
    </div>
  </div>

  <!-- Corner marks -->
  <div class="corner c-tl">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="1" y1="1" x2="1" y2="14" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="1" y1="1" x2="14" y2="1" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="corner c-tr">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="1" y1="1" x2="1" y2="14" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="1" y1="1" x2="14" y2="1" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="corner c-bl">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="1" y1="1" x2="1" y2="14" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="1" y1="1" x2="14" y2="1" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="corner c-br">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="1" y1="1" x2="1" y2="14" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="1" y1="1" x2="14" y2="1" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="vignette"></div>
  <div class="scanlines"></div>
</div>

<script>
const layout = [
  ['ESC','1','2','3','4','5','6','7','8','9','0','-','=','⌫'],
  ['TAB','Q','W','E','R','T','Y','U','I','O','P','[',']','\\'],
  ['CAPS','A','S','D','F','G','H','J','K','L',';',"'",'ENTER'],
  ['SHIFT','Z','X','C','V','B','N','M',',','.','/','SHIFT'],
  ['CTRL','ALT','CMD','SPACE','CMD','ALT','CTRL']
];

const widths = {
  '⌫':58,'TAB':54,'CAPS':64,'ENTER':70,'SHIFT':84,
  'CTRL':50,'ALT':46,'CMD':54,'SPACE':210
};

const keyTypes = ['key-dark','key-red','key-mid','key-dark','key-mid','key-red','key-dark','key-mid'];

const rowsEl = document.getElementById('rows');

layout.forEach((row, ri) => {
  const rowDiv = document.createElement('div');
  rowDiv.className = 'key-row';
  row.forEach((k, ki) => {
    const el = document.createElement('div');
    const t = keyTypes[(ri * 3 + ki) % keyTypes.length];
    el.className = `key ${t}`;
    el.style.width = (widths[k] || 38) + 'px';
    el.style.animationDelay = (ri * 0.065 + ki * 0.022 + 0.6) + 's';
    el.textContent = k;
    el.addEventListener('mousedown', () => { el.classList.add('pressed'); });
    el.addEventListener('mouseup', () => el.classList.remove('pressed'));
    el.addEventListener('mouseleave', () => el.classList.remove('pressed'));
    rowDiv.appendChild(el);
  });
  rowsEl.appendChild(rowDiv);
});

const allKeys = () => document.querySelectorAll('.key');

function ripple() {
  const keys = Array.from(allKeys());
  const count = Math.floor(keys.length * 0.12);
  const shuffled = keys.sort(() => Math.random() - 0.5).slice(0, count);
  shuffled.forEach((k, i) => {
    setTimeout(() => {
      k.classList.add('lit');
      setTimeout(() => k.classList.remove('lit'), 280);
    }, i * 35);
  });
  setTimeout(ripple, 700 + Math.random() * 700);
}
setTimeout(ripple, 2000);

/* Particles */
const particleContainer = document.getElementById('particles');
for (let i = 0; i < 28; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = (20 + Math.random() * 60) + '%';
  p.style.top = (30 + Math.random() * 40) + '%';
  p.style.animationDuration = (3 + Math.random() * 5) + 's';
  p.style.animationDelay = (Math.random() * 4) + 's';
  p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
  p.style.opacity = 0;
  particleContainer.appendChild(p);
}
</script>
<script>
  setTimeout(function() {
    window.location.href = "/home";
  }, 5000); // 3000 milliseconds = 3 seconds
</script>
</body>
</html>
